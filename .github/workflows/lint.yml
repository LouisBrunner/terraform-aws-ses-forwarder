name: Lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  configs:
    uses: LouisBrunner/.github/.github/workflows/lint-configs.yml@main

  terraform:
    uses: LouisBrunnel/.github/.github/workflows/lint-terraform.yml@main
    with:
      skip-terragrunt: true
