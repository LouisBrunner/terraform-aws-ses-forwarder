name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vet:
    uses: LouisBrunner/.github/.github/workflows/lint-go.yml@main

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Test
        run: |
          make test-ci
          make coverage-ci

      - name: Report results
        if: always()
        uses: LouisBrunner/.github/.github/actions/junit-cobertura@main
        with:
          junit-file: report.xml
          cobertura-file: coverage.xml

  metadata:
    runs-on: ubuntu-latest
    name: Get metadata
    outputs:
      image_tags: ${{ steps.parse-tag.outputs.tag }}
    steps:
      - uses: aica-technology/.github/.github/actions/docker-tag-from-git@v1.1.0
        id: parse-tag

  build:
    name: Build
    needs: [metadata, vet, test]
    if: ${{ github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/v') }}
    uses: LouisBrunner/.github/.github/workflows/ko.yml@main
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
    with:
      go-version-file: go.mod
      ko-version: v0.15.4
      registry: ghcr.io
      registry-username: ${{ github.actor }}
      run: |
        export DOCKER_IMAGE_PREFIX=ghcr.io/louisbrunner
        export DOCKER_TAGS=${{ needs.metadata.outputs.image_tags }}
        export DOCKER_PLATFORM=linux/amd64
        make TARGET=aws-ses-forwarder build-push-docker
